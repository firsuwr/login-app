<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>FIRS UWR · Portale Atleti</title>

  <!-- ===== Installazione su iPhone (schermata Home, a tutto schermo) ===== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FIRS UWR">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050c18">

  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Andrea91x/immagini-UWR/cf9e13f6240e9fe83e99be32db149476337eb038/Logo-Firs.jpeg">
  <link rel="icon" href="https://raw.githubusercontent.com/Andrea91x/immagini-UWR/cf9e13f6240e9fe83e99be32db149476337eb038/Logo-Firs.jpeg">

  <!-- Apre in anticipo il canale verso Google -->
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com">

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;width:100%;overflow:hidden;background:#050c18;
      font-family:-apple-system,"Segoe UI",Roboto,sans-serif;}

    /* A TUTTO SCHERMO: l'iframe copre l'intero schermo, bordo a bordo.
       Le safe-area NON si gestiscono qui (dentro l'iframe valgono zero):
       il wrapper le misura in JS e le passa al portale via URL, che poi
       spinge header e menu al posto giusto restando a tutto schermo. */
    #app{position:fixed; top:0; left:0; width:100%; height:100vh; height:100dvh; border:none; display:block; background:#050c18;}

    /* Schermata di caricamento (oceano profondo) sopra il portale */
    #splash{
      position:fixed;inset:0;z-index:10;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
      padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      background:
        radial-gradient(120% 90% at 50% -25%, #1c5478 0%, rgba(28,84,120,0) 44%),
        radial-gradient(90% 60% at 50% 120%, rgba(255,106,26,0.13) 0%, rgba(255,106,26,0) 55%),
        linear-gradient(180deg,#103049 0%,#0a1a2e 48%,#050c18 100%);
      transition:opacity .45s ease;
    }
    #splash.hidden{opacity:0;pointer-events:none;}

    .crest{position:relative;display:inline-block;}
    .crest img{width:108px;height:auto;border-radius:24px;display:block;
      border:2.5px solid rgba(255,106,26,.6);
      box-shadow:0 0 0 8px rgba(255,106,26,.07),0 20px 50px rgba(0,0,0,.6);
      position:relative;z-index:1;animation:bob 6s ease-in-out infinite;}
    .crest::after{content:"";position:absolute;inset:-12px;border-radius:36px;
      border:1px solid rgba(255,106,26,.28);animation:halo 3.4s ease-out infinite;}
    @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
    @keyframes halo{0%{transform:scale(.9);opacity:.8;}100%{transform:scale(1.34);opacity:0;}}

    .ring{width:36px;height:36px;border:3px solid rgba(255,106,26,.18);border-top-color:#ff6a1a;
      border-radius:50%;animation:spin .85s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #splash p{color:#c3d0ea;font-size:12px;letter-spacing:1px;text-transform:uppercase;opacity:.75;}

    /* Schermo di ripiego se il portale non si carica (mostrato solo se serve) */
    #fallback{
      position:fixed;inset:0;z-index:20;display:none;
      flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;
      padding:env(safe-area-inset-top) 28px env(safe-area-inset-bottom);
      background:linear-gradient(180deg,#0a1a2e 0%,#050c18 100%);
    }
    #fallback h2{font-size:18px;color:#fff;}
    #fallback p{font-size:14px;color:#c3d0ea;line-height:1.55;max-width:330px;opacity:.85;}
    #fallback a{display:inline-block;margin-top:6px;padding:13px 24px;
      background:linear-gradient(135deg,#ff7a1a,#ff5e00);color:#fff;text-decoration:none;
      border-radius:12px;font-weight:700;font-size:15px;box-shadow:0 10px 26px rgba(255,106,26,.4);}

    @media(prefers-reduced-motion:reduce){.crest img,.crest::after,.ring{animation:none;}}
  </style>
</head>
<body>

  <!-- ============================================================
       UNICA COSA DA CAMBIARE: l'indirizzo del portale (finisce con
       /exec?page=portale). Distribuisci -> Gestisci distribuzioni.
       ============================================================ -->
  <script>
    var URL_APP = "https://script.google.com/macros/s/AKfycbxiiWnOe9cjxiwLIGkhqRUMiPruu1XRGOcXw6yhMT0qw0kutEJN2qdTRqVXPF2wb3s/exec?page=portale";
  </script>

  <iframe id="app" title="Portale FIRS UWR" allow="clipboard-read; clipboard-write; camera; microphone"></iframe>

  <div id="splash">
    <div class="crest">
      <img src="https://raw.githubusercontent.com/Andrea91x/immagini-UWR/cf9e13f6240e9fe83e99be32db149476337eb038/Logo-Firs.jpeg" alt="FIRS UWR">
    </div>
    <div class="ring"></div>
    <p>Apertura del portale… <span style="opacity:.45">v3</span></p>
  </div>

  <div id="fallback">
    <h2>Il portale non si apre</h2>
    <p>Assicurati che la Web App sia distribuita con <b>"Chi ha accesso: Chiunque"</b>. In alternativa aprilo a tutto schermo:</p>
    <a id="fallbackLink" href="#" target="_blank" rel="noopener">Apri il portale ↗</a>
  </div>

  <script>
    (function () {
      var iframe   = document.getElementById('app');
      var splash   = document.getElementById('splash');
      var fallback = document.getElementById('fallback');
      var fbLink   = document.getElementById('fallbackLink');

      // Misura le safe-area (px) e le passa al portale via URL: dentro l'iframe
      // quei valori valgono zero, quindi ci pensa il wrapper a comunicarle.
      function insetPx(side){
        var d=document.createElement('div');
        d.style.cssText='position:fixed;left:0;top:0;width:1px;height:env(safe-area-inset-'+side+');visibility:hidden;pointer-events:none;';
        document.body.appendChild(d);
        var v=Math.round(d.getBoundingClientRect().height);
        d.parentNode.removeChild(d);
        return v;
      }
      // Le zone sicure a volte valgono 0 se lette subito: rimisuro finche'
      // non danno un valore (fino a ~1s), POI apro il portale con i valori giusti.
      var _sat = 0, _sab = 0;
      function _misuraEApri(tentativo) {
        _sat = insetPx('top'); _sab = insetPx('bottom');
        if (_sat === 0 && _sab === 0 && tentativo < 8) {
          return requestAnimationFrame(function(){ _misuraEApri(tentativo + 1); });
        }
        var _url = URL_APP + (URL_APP.indexOf('?')>-1?'&':'?') + 'sat=' + _sat + '&sab=' + _sab;
        fbLink.href = _url;
        iframe.src  = _url;   // carica il portale passando le zone sicure misurate
      }
      requestAnimationFrame(function(){ _misuraEApri(0); });

      // Canale di riserva: spedisce le stesse misure DENTRO il portale con un
      // messaggio diretto, ripetuto per ~12 secondi (il portale vive in una
      // doppia scatola di Google e impiega qualche secondo a essere pronto).
      function inviaMisure() {
        var msg = { firsSafeArea: true, sat: _sat, sab: _sab };
        try { iframe.contentWindow.postMessage(msg, '*'); } catch (e) {}
        try {
          var fr = iframe.contentWindow.frames;
          for (var i = 0; i < fr.length; i++) { try { fr[i].postMessage(msg, '*'); } catch (e2) {} }
        } catch (e) {}
      }
      var _nInvii = 0;
      var _timerMisure = setInterval(function () {
        inviaMisure();
        if (++_nInvii >= 40) clearInterval(_timerMisure);
      }, 300);
      iframe.addEventListener('load', inviaMisure);

      // Nasconde lo splash quando il portale ha finito di caricare
      iframe.addEventListener('load', function () {
        splash.classList.add('hidden');
        setTimeout(function () { splash.style.display = 'none'; }, 500);
      });

      // Ripiego: se dopo 12 s non si è caricato nulla, mostra l'aiuto
      setTimeout(function () {
        if (splash.style.display !== 'none') {
          splash.style.display = 'none';
          fallback.style.display = 'flex';
        }
      }, 12000);
    })();
  </script>

</body>
</html>
