<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover: usa tutto lo schermo anche sui telefoni col notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>FIRS UWR · Portale Atleti</title>

  <!-- Apertura a tutto schermo quando si aggiunge alla schermata Home -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FIRS UWR">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a1629">

  <!-- Icona per la schermata Home / scheda del browser -->
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Andrea91x/immagini-UWR/cf9e13f6240e9fe83e99be32db149476337eb038/Logo-Firs.jpeg">
  <link rel="icon" href="https://raw.githubusercontent.com/Andrea91x/immagini-UWR/cf9e13f6240e9fe83e99be32db149476337eb038/Logo-Firs.jpeg">

  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #ff6a1a;
      --bg: #0a1629;
      --soft: #cfd8ea;
      --muted: #7c89a3;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* L'iframe col portale occupa tutto lo schermo */
    #portale {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity .5s ease;
      background: var(--bg);
    }
    #portale.pronto { opacity: 1; }

    /* ── Schermata di caricamento (profondità oceano) ── */
    #caricamento {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px calc(40px + env(safe-area-inset-bottom));
      text-align: center;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(255,106,26,0.12), transparent 60%),
        radial-gradient(900px 500px at 50% 120%, rgba(29,78,216,0.18), transparent 60%),
        linear-gradient(180deg, #071120 0%, #0a1629 55%, #0b1a30 100%);
      transition: opacity .5s ease, visibility .5s ease;
    }
    #caricamento.nascondi { opacity: 0; visibility: hidden; }

    /* Polpo in filigrana sullo sfondo */
    .polpo {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      max-width: 92%;
      opacity: .05;
      filter: grayscale(1) brightness(1.6);
      pointer-events: none;
      user-select: none;
    }

    .box { position: relative; z-index: 1; width: 100%; max-width: 320px; }

    /* Logo quadrato con anello arancione luminoso + leggero galleggiamento */
    .logo {
      width: 118px;
      height: 118px;
      object-fit: cover;
      border-radius: 26px;
      box-shadow:
        0 0 0 4px rgba(255,106,26,0.18),
        0 0 30px rgba(255,106,26,0.38),
        0 18px 44px rgba(0,0,0,0.6);
      animation: galleggia 3.4s ease-in-out infinite;
    }
    @keyframes galleggia {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-9px); }
    }

    .brand {
      font-family: 'Exo 2', sans-serif;
      font-weight: 800;
      font-size: 30px;
      letter-spacing: .5px;
      margin-top: 20px;
      background: linear-gradient(90deg, #ffffff, #ffd9bf);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub {
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--primary);
      margin-top: 6px;
    }

    /* Barra di caricamento a onda */
    .onde {
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-top: 34px;
    }
    .onde span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--primary);
      opacity: .35;
      animation: salta 1.1s ease-in-out infinite;
    }
    .onde span:nth-child(2) { animation-delay: .15s; }
    .onde span:nth-child(3) { animation-delay: .30s; }
    .onde span:nth-child(4) { animation-delay: .45s; }
    @keyframes salta {
      0%,100% { transform: translateY(0); opacity: .35; }
      40%     { transform: translateY(-11px); opacity: 1; }
    }

    .attesa {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--soft);
      margin-top: 22px;
    }

    /* Link di riserva: compare solo se il portale tarda o non si apre */
    .riserva {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--muted);
      margin-top: 26px;
      opacity: 0;
      transition: opacity .4s ease;
      pointer-events: none;
    }
    .riserva.mostra { opacity: 1; pointer-events: auto; }
    .riserva a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,106,26,0.4);
      padding-bottom: 1px;
    }
  </style>
</head>
<body>

  <!-- Il portale vero e proprio, caricato dal web app di Google Apps Script -->
  <iframe id="portale" title="Portale FIRS" allow="clipboard-read; clipboard-write; camera; microphone"></iframe>

  <!-- Schermata di caricamento mostrata finché il portale non è pronto -->
  <div id="caricamento">
    <img class="polpo" src="https://raw.githubusercontent.com/firsuwr/Logo-firs-scritta/df208b0f0a4196de1523694c6702b90c163bf4cc/polpo_firs.png" alt="">
    <div class="box">
      <img class="logo" src="https://raw.githubusercontent.com/Andrea91x/immagini-UWR/cf9e13f6240e9fe83e99be32db149476337eb038/Logo-Firs.jpeg" alt="FIRS UWR">
      <div class="brand">FIRS UWR</div>
      <div class="sub">Firenze Rugby Subacqueo</div>

      <div class="onde"><span></span><span></span><span></span><span></span></div>
      <div class="attesa">Sto aprendo il portale…</div>

      <div class="riserva" id="riserva">
        Non si apre? <a id="linkRiserva" href="#" target="_blank" rel="noopener">Tocca qui per aprirlo</a>
      </div>
    </div>
  </div>

  <script>
    var URL_PORTALE = "https://script.google.com/macros/s/AKfycbxiiWnOe9cjxiwLIGkhqRUMiPruu1XRGOcXw6yhMT0qw0kutEJN2qdTRqVXPF2wb3s/exec?page=portale";

    (function () {
      var iframe   = document.getElementById('portale');
      var loader   = document.getElementById('caricamento');
      var riserva  = document.getElementById('riserva');
      var link     = document.getElementById('linkRiserva');

      // Link di riserva punta allo stesso portale
      link.href = URL_PORTALE;

      var partito = Date.now();
      var chiuso  = false;

      // Nasconde la schermata di caricamento e mostra il portale
      function mostraPortale() {
        if (chiuso) return;
        chiuso = true;
        // Tiene il logo visibile per almeno 600 ms (evita lo sfarfallio)
        var trascorso = Date.now() - partito;
        var attesa = Math.max(0, 600 - trascorso);
        setTimeout(function () {
          iframe.classList.add('pronto');
          loader.classList.add('nascondi');
        }, attesa);
      }

      // Quando il portale ha finito di caricare, lo mostriamo
      iframe.addEventListener('load', function () {
        // Il web app di Google a volte carica una pagina-ponte prima:
        // un piccolo ritardo assicura che dentro ci sia già il portale.
        setTimeout(mostraPortale, 400);
      });

      // Avvio del caricamento
      iframe.src = URL_PORTALE;

      // Rete di sicurezza: se dopo 9 s non è ancora pronto, mostro
      // comunque il portale e offro il link di riserva.
      setTimeout(function () {
        if (!chiuso) {
          mostraPortale();
          riserva.classList.add('mostra');
        }
      }, 9000);

      // Se per qualsiasi motivo la schermata resta, mostra il link
      // di riserva dopo 4 s così l'atleta non resta mai bloccato.
      setTimeout(function () {
        if (!chiuso) riserva.classList.add('mostra');
      }, 4000);
    })();
  </script>
</body>
</html>
